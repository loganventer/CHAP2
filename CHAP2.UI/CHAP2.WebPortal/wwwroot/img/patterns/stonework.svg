<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 120 80">
    <g fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1">
        <!-- Running bond brick pattern -->
        <rect x="0"   y="0"  width="40" height="20"/>
        <rect x="40"  y="0"  width="40" height="20"/>
        <rect x="80"  y="0"  width="40" height="20"/>
        <rect x="-20" y="20" width="40" height="20"/>
        <rect x="20"  y="20" width="40" height="20"/>
        <rect x="60"  y="20" width="40" height="20"/>
        <rect x="100" y="20" width="40" height="20"/>
        <rect x="0"   y="40" width="40" height="20"/>
        <rect x="40"  y="40" width="40" height="20"/>
        <rect x="80"  y="40" width="40" height="20"/>
        <rect x="-20" y="60" width="40" height="20"/>
        <rect x="20"  y="60" width="40" height="20"/>
        <rect x="60"  y="60" width="40" height="20"/>
        <rect x="100" y="60" width="40" height="20"/>
    </g>
</svg>
