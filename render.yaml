services:
  - type: web
    name: chap2-api
    runtime: docker
    dockerfilePath: langchain_search_service/Dockerfile.api.simple
    dockerContext: .
    region: frankfurt
    plan: starter
    disk:
      name: chap2-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ASPNETCORE_Kestrel__Endpoints__Http__Url
        value: http://0.0.0.0:10000
      # Chorus data lives on the persistent disk so edits survive
      # redeploys.
      - key: ChorusResource__FolderPath
        value: /var/data/chorus
      # Daily git sync (pull + commit + push) at 03:00 UTC. Disabled
      # by default in the code; only Render flips it on so a local
      # `docker run` of this image stays offline-safe.
      - key: GitSync__Enabled
        value: "true"
      - key: GitSync__ScheduleUtc
        value: "03:00"
      - key: GitSync__DataDirectory
        value: /var/data/chorus
      - key: GitSync__ImageSeedDirectory
        value: /app/data/chorus
      - key: GitSync__RemoteUrl
        value: https://github.com/loganventer/CHAP2.git
      - key: GitSync__Branch
        value: main
      - key: GitSync__AuthorName
        value: CHAP2 API
      - key: GitSync__AuthorEmail
        value: chap2-api@noreply.local
      - key: GitSync__GitHubToken
        sync: false   # set as a Render secret; reuse the existing PAT

  - type: web
    name: chap2-web
    runtime: docker
    dockerfilePath: langchain_search_service/Dockerfile.webportal.simple
    dockerContext: .
    region: frankfurt
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ASPNETCORE_Kestrel__Endpoints__Http__Url
        value: http://0.0.0.0:10000
      - key: ApiService__BaseUrl
        fromService:
          name: chap2-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
