services:
  - type: web
    name: chap2-api
    runtime: docker
    dockerfilePath: langchain_search_service/Dockerfile.api.simple
    dockerContext: .
    region: frankfurt
    plan: starter
    disk:
      name: chap2-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ASPNETCORE_Kestrel__Endpoints__Http__Url
        value: http://0.0.0.0:10000
      # Disk layout: chorus JSONs live FLAT at /var/data/{id}.json.
      # No git on disk -- the daily sync uses the GitHub Git Data API
      # to mirror the directory to data/chorus/ in the repo.
      - key: ChorusResource__FolderPath
        value: /var/data
      # Daily GitHub mirror at 03:00 UTC. Disabled by default in the
      # code so a local `docker run` of this image stays offline-safe.
      - key: GitSync__Enabled
        value: "true"
      - key: GitSync__ScheduleUtc
        value: "03:00"
      - key: GitSync__DataDirectory
        value: /var/data
      - key: GitSync__ImageSeedDirectory
        value: /app/data/chorus
      - key: GitSync__Owner
        value: loganventer
      - key: GitSync__Repo
        value: CHAP2
      # Two-branch workflow: API mirrors edits to chorus-edits; admin
      # promotes onto main from the Settings page (server-side merge via
      # GitHub's POST /repos/{owner}/{repo}/merges). Set MainBranch="" to
      # disable the promote endpoint (single-branch fallback).
      - key: GitSync__Branch
        value: chorus-edits
      - key: GitSync__MainBranch
        value: main
      - key: GitSync__RemotePathPrefix
        value: data/chorus
      - key: GitSync__AuthorName
        value: CHAP2 API
      - key: GitSync__AuthorEmail
        value: chap2-api@noreply.local
      - key: GitSync__GitHubToken
        sync: false   # set as a Render secret; the existing PAT

      # --- Identity / RBAC / SQLite ---
      - key: Identity__DatabasePath
        value: /var/data/chap2.db
      - key: Identity__DataProtectionKeysPath
        value: /var/data/keys
      - key: Identity__SeedAdminUserName
        value: ekvjc
      - key: Identity__SeedAdminEmail
        value: ekvjc@chap2.local
      - key: Identity__SeedAdminInitialPassword
        sync: false   # Render secret; rotated by admin on first login
      # One-shot recovery: set true, redeploy, log in, set back to false.
      - key: Identity__ForceReseedAdmin
        value: "false"
      - key: Identity__BearerTokenExpiration
        value: "01:00:00"
      - key: Identity__RefreshTokenExpiration
        value: "14.00:00:00"

      # --- Rate limiting (per-IP, anonymous auth endpoints) ---
      - key: RateLimit__AuthRequestsPerMinute
        value: "10"
      - key: RateLimit__AuthQueueLimit
        value: "0"

      # --- Email (SMTP) for password recovery + email confirmation ---
      # Leave Host blank to disable outbound email (sends drop with a warning).
      - key: Email__Host
        sync: false
      - key: Email__Port
        value: "587"
      - key: Email__UseStartTls
        value: "true"
      - key: Email__UserName
        sync: false
      - key: Email__Password
        sync: false
      - key: Email__FromAddress
        sync: false
      - key: Email__FromDisplayName
        value: CHAP2
      # The Portal handles these landing pages; templates take {email}/{token}/{userId}.
      - key: Email__PasswordResetUrlTemplate
        sync: false
      - key: Email__EmailConfirmationUrlTemplate
        sync: false

  - type: web
    name: chap2-web
    runtime: docker
    dockerfilePath: langchain_search_service/Dockerfile.webportal.simple
    dockerContext: .
    region: frankfurt
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ASPNETCORE_Kestrel__Endpoints__Http__Url
        value: http://0.0.0.0:10000
      - key: ApiService__BaseUrl
        fromService:
          name: chap2-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      # --- API-forwarding auth (browser cookie wraps API bearer tokens) ---
      - key: ApiAuth__CookieName
        value: chap2-auth
      - key: ApiAuth__CookieLifetime
        value: "30.00:00:00"
